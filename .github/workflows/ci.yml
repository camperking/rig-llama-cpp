name: CI

on:
  push:
    branches: [master]
  # Pull requests are gated: a maintainer must add the `ci-ok` label to
  # trigger CI. We listen on `labeled` to fire as soon as the gate opens,
  # and on `synchronize` / `reopened` so subsequent pushes re-run CI while
  # the label is still attached. `opened` is intentionally omitted so a
  # fresh PR doesn't burn Actions minutes before review.
  pull_request:
    types: [labeled, synchronize, reopened]

env:
  CARGO_TERM_COLOR: always
  # Fail rustdoc on broken intra-doc links / missing items so doc rot can't
  # land silently.
  RUSTDOCFLAGS: -D warnings

# Cancel in-flight runs on the same ref when a new push lands. Keeps Actions
# minutes from piling up on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Single job covering everything that doesn't need a GGUF model:
  # formatting, lints, the non-`#[ignore]` unit tests, doctests, and the
  # rustdoc build. We deliberately don't matrix across GPU backends —
  # llama-cpp-rs already validates backend compilation upstream and our
  # default build is CPU-only, so a single ubuntu-latest run covers our
  # delta. Model-bearing tests are `#[ignore]` and require `MODEL_PATH`,
  # so they don't execute here (run them locally via `run_tests.sh`).
  #
  # The `if:` clause is the PR gate: pushes to master always run, but a
  # `pull_request` event only runs once a maintainer has applied the
  # `ci-ok` label. The `labeled`/`synchronize`/`reopened` triggers above
  # only schedule the workflow; this conditional is what actually decides
  # whether a job runs.
  check:
    name: check / clippy / test
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ci-ok')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + target/
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      # Both clippy runs are necessary: there are `#[cfg(not(feature =
      # "mtmd"))]` branches in request.rs, loader.rs and client.rs that
      # only compile when mtmd is off, so a single `--features mtmd` run
      # would never typecheck them.
      - name: cargo clippy (default features)
        run: cargo clippy --no-deps --all-targets -- -D warnings

      - name: cargo clippy (--features mtmd)
        run: cargo clippy --no-deps --all-targets --features mtmd -- -D warnings

      - name: cargo test --lib (model-bearing tests stay #[ignore])
        run: cargo test --lib

      - name: cargo test --doc
        run: cargo test --doc

      - name: cargo doc (--features mtmd)
        run: cargo doc --no-deps --features mtmd

  # MSRV verification: build against the exact Rust version declared in
  # Cargo.toml's `rust-version` so doctests / let-chains / new lints can't
  # regress the floor without us noticing. `cargo check` only — `clippy` and
  # `rustfmt` shipped behaviour changes between MSRV and stable, and we
  # already cover those in the `check` job above.
  msrv:
    name: msrv (rust-version from Cargo.toml)
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ci-ok')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          msrv=$(grep -E '^rust-version\s*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$msrv" >> "$GITHUB_OUTPUT"
          echo "Pinned MSRV: $msrv"

      - name: Install Rust toolchain (MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Cache cargo registry + target/
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv-${{ steps.msrv.outputs.version }}

      - name: cargo check (default features)
        run: cargo check --all-targets

      - name: cargo check (--features mtmd)
        run: cargo check --all-targets --features mtmd
